services:
  app:
    build: .
    container_name: aplikasi-smartlaundry

    ports:
      - "8080:80"

    env_file:
      - .env

    depends_on:
      mysql:
        condition: service_healthy

    restart: unless-stopped

    networks:
      - smartlaundry-network

  mysql:
    image: mysql:8.0

    container_name: smartlaundry-mysql

    restart: unless-stopped

    environment:
      MYSQL_DATABASE: smartlaundry
      MYSQL_ROOT_PASSWORD: root

    ports:
      - "3307:3306"

    volumes:
      - mysql_data:/var/lib/mysql

    networks:
      - smartlaundry-network

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql_data:

networks:
  smartlaundry-network:
